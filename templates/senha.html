<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/style-senha.css">
    <title>Guitar Academy - Recuperar Senha</title>
  </head>
  <body>
    <div class="login-card">
      <i class="fa-solid fa-graduation-cap"></i>
      <div class="senha-main">
        <h2>Recuperar Senha</h2>
        {% if success %}
          <div id="authSuccess" style="color: #cfe9ff; font-size: 0.9rem; text-align: center; background-color: #071022; border: 1px solid #73adff; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
            {{ success }}
          </div>
        {% endif %}
        {% if error %}
          <div id="authError" style="color: #ff6b6b; font-size: 0.9rem; text-align: center; background-color: #1a0a0a; border: 1px solid #ff6b6b; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
            {{ error }}
          </div>
        {% endif %}
        <form action="/esqueci-senha" id="senhaForm" method="post">
          <div class="form-container">
            <div class="form-group">
              <input
                id="email"
                name="email"
                type="email"
                placeholder=" "
                autocomplete="off"
                required
              />
              <label for="email">E-mail</label>
            </div>

            <p class="ja-recebi"><a href="/login">Já recebi o email, continuar login</a></p>

            <button type="submit">ENVIAR E-MAIL</button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
