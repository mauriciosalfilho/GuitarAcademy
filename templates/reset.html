<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/style-reset.css">
    <title>Guitar Academy - Redefinir Senha</title>
  </head>
  <body>
    <div class="login-card">
      <i class="fa-solid fa-graduation-cap"></i>
      <div class="reset-main">
        <h2>Redefinir Senha</h2>
        {% if error %}
          <div id="authError" style="color: #ff6b6b; font-size: 0.9rem; text-align: center; background-color: #1a0a0a; border: 1px solid #ff6b6b; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
            {{ error }}
          </div>
        {% endif %}
        <form action="" id="resetForm" method="post">
          <div class="form-container">
            <div class="form-group">
              <input
                id="nova-senha"
                name="nova_senha"
                type="password"
                placeholder=" "
                minlength="6"
                required
              />
              <label for="nova-senha">Nova Senha</label>
            </div>
            <div id="senhaError" style="color: #ff6b6b; font-size: 0.8rem; text-align: left; display: none; margin-top: -10px; margin-bottom: 5px;"></div>

            <div class="form-group">
              <input
                id="confirmar-senha"
                name="confirmar_senha"
                type="password"
                placeholder=" "
                minlength="6"
                required
              />
              <label for="confirmar-senha">Confirmar Senha</label>
            </div>
            <div id="confirmarError" style="color: #ff6b6b; font-size: 0.8rem; text-align: left; display: none; margin-top: -10px; margin-bottom: 5px;"></div>

            <div id="indicadorForca" style="margin-top: 10px; display: none;">
              <p style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">Força da senha:</p>
              <div style="background-color: #242a33; border-radius: 5px; height: 6px; overflow: hidden;">
                <div id="forcaBar" style="height: 100%; width: 0%; background-color: #ff6b6b; transition: width 0.3s ease;"></div>
              </div>
            </div>

            <button type="submit">REDEFINIR SENHA</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/static/js/reset.js"></script>
  </body>
</html>
