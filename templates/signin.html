<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Guitar Academy</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Montserrat", sans-serif;
        color: #fff;
      }

      html,
      body {
        height: 100%;
        color: #fff;
        overflow: hidden;
      }

      body {
        background: linear-gradient(
          to bottom,
          #0d121f 0%,
          #0a0f19 80%,
          #0a0a0a 100%
        );
        display: grid;
        place-items: center;
        margin: 0;
        padding: 0 24px;
      }

      .login-card {
        position: relative;
        z-index: 3;
        width: 100%;
        margin: 0 20px;
        padding: 20px 30px 20px;
        border-radius: 10px;
        background: #101214;
        border: 1px solid #2a2f36;
        text-align: center;
        color: #fff;
      }

      .login-card i {
        font-size: 48px;
        color: #73adff;
        margin-bottom: 12px;
      }

      .login-card h2 {
        font-size: 36px;
        font-weight: 600;
        margin: 0 0 12px;
        color: #a3c9ff;
      }

      .login-card h3 {
        color: #ccc;
        margin: 0 0 30px;
        font-weight: 500;
        font-size: 1rem;
      }

      .signin-main {
        width: 100%;
        margin: 0;
        position: relative;
      }

      .signin-main input,
      .signin-main button {
        width: 100%;
        font-family: inherit;
      }

      .signin-main button {
        height: 50px;
      }

      .form-group {
        position: relative;
        margin-bottom: 0;
      }

      .form-group input {
        border: 1px solid #2a2f36;
        font-size: 15px;
        padding: 16px;
        border-radius: 10px;
        background-color: #101214;
        color: #fff;
        transition: border-color 0.3s ease;
        width: 100%;
      }

      .form-group input:hover {
        border-color: #73adff;
      }

      .form-group input:focus {
        outline: none;
        border-color: #73adff;
      }

      .form-group label {
        position: absolute;
        top: 16px;
        left: 16px;
        font-size: 15px;
        color: #888;
        pointer-events: none;
        transition: all 0.3s ease;
        transform-origin: left top;
      }

      .form-group input:focus ~ label,
      .form-group input:not(:placeholder-shown) ~ label {
        top: -8px;
        left: 12px;
        font-size: 12px;
        color: #73adff;
        background-color: #101214;
        padding: 0 4px;
      }

      .signup-main input {
        border: 1px solid #2a2f36;
        font-size: 15px;
        padding: 16px;
        border-radius: 10px;
        background-color: #101214;
        color: #fff;
        transition: border-color 0.3s ease;
      }

      .signup-main input:hover {
        border-color: #73adff;
      }

      .signup-main input:focus {
        outline: none;
        border-color: #73adff;
      }

      .signin-main button {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0.75rem 1.8rem;
        background-color: #30363d;
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        text-align: center;
        transition: background-color 0.3s ease, color 0.3s ease,
          transform 0.3s ease;
        user-select: none;
      }

      .signin-main button:hover {
        background-color: #a3c9ff;
        color: #1a2238;
        transform: translateY(-2px);
      }

      .signin-main a {
        color: #a3c9ff;
        font-size: 0.9rem;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .signin-main a:hover {
        color: #a3c9ff;
      }

      .signin-link {
        text-align: center;
        margin-top: 8px;
      }

      .form-container {
        display: grid;
        gap: 16px;
      }

      .wizard-page {
        display: grid;
        gap: 16px;
        transition: transform 0.4s ease-in-out, opacity 0.4s ease-in-out;
        opacity: 1;
        transform: translateX(0);
      }

      .wizard-page.hidden {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        opacity: 0;
        pointer-events: none;
      }

      .wizard-page.slide-out-left {
        transform: translateX(-100%);
        opacity: 0;
      }

      .wizard-page.slide-out-right {
        transform: translateX(100%);
        opacity: 0;
      }

      .wizard-page.slide-in-left {
        animation: slideInFromRight 0.4s ease-in-out forwards;
      }

      .wizard-page.slide-in-right {
        animation: slideInFromLeft 0.4s ease-in-out forwards;
      }

      @keyframes slideInFromRight {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideInFromLeft {
        from {
          transform: translateX(-100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .button-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .button-group.single {
        grid-template-columns: 1fr;
      }

      @keyframes rotate {
        100% {
          background-position: 15% 50%;
        }
      }

      @media (width < 1024px) {
        body {
          padding: 0 16px;
        }
        .login-card {
          padding: 16px 20px 16px;
        }
        .signup-main input {
          padding: 8px;
        }
      }

      @media (width >= 500px) {
        body {
          padding: 0;
        }
        .login-card {
          margin: 0;
          width: 400px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <i class="fa-solid fa-graduation-cap"></i>
      <div class="signin-main">
        {% if success %}
          <div id="authSuccess" style="color: #cfe9ff; font-size: 0.9rem; text-align: center; background-color: #071022; border: 1px solid #73adff; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
            {{ success }}
          </div>
        {% endif %}
        {% if error %}
          <div id="authError" style="color: #ff6b6b; font-size: 0.9rem; text-align: center; background-color: #1a0a0a; border: 1px solid #ff6b6b; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
            {{ error }}
          </div>
        {% endif %}
        <form action="/signin" id="signinForm" method="post">
          <div class="form-container">
            <div class="form-group">
              <input
                id="cpf"
                name="cpf"
                placeholder=" "
                inputmode="numeric"
                maxlength="14"
                autocomplete="off"
                required
              />
              <label for="cpf">CPF</label>
            </div>
            <div id="cpfError" style="color: #ff6b6b; font-size: 0.8rem; text-align: left; display: none; margin-top: -10px; margin-bottom: 5px;">
              CPF inválido!
            </div>

            <div class="form-group">
              <input type="password" name="password" id="password" placeholder=" " required minlength="6"/>
              <label for="password">Senha</label>
            </div>

            <button type="submit">ENTRAR</button>
          </div>

          <p class="signin-link">Ainda não tem uma conta? <a href="/cadastro">Cadastre-se</a></p>
        </form>
      </div>
    </div>
    <script>
      const form = document.getElementById("signinForm");

      const validaCPF = function(cpf) {
        cpf = cpf.replace(/[^\d]+/g,'');
        if(cpf == '') return false; 
        if (cpf.length != 11 || 
            cpf == "00000000000" || 
            cpf == "11111111111" || 
            cpf == "22222222222" || 
            cpf == "33333333333" || 
            cpf == "44444444444" || 
            cpf == "55555555555" || 
            cpf == "66666666666" || 
            cpf == "77777777777" || 
            cpf == "88888888888" || 
            cpf == "99999999999")
            return false;      
        let add = 0;    
        for (let i=0; i < 9; i ++)
            add += parseInt(cpf.charAt(i)) * (10 - i);  
        let rev = 11 - (add % 11);  
        if (rev == 10 || rev == 11)     
            rev = 0;    
        if (rev != parseInt(cpf.charAt(9)))     
            return false;       
        add = 0;    
        for (let i = 0; i < 10; i ++)        
            add += parseInt(cpf.charAt(i)) * (11 - i);  
        rev = 11 - (add % 11);  
        if (rev == 10 || rev == 11) 
            rev = 0;    
        if (rev != parseInt(cpf.charAt(10)))
            return false;       
        return true;   
      };

      // Validação ao enviar o formulário
      form.addEventListener("submit", (e) => {
        const cpf = document.getElementById('cpf');
        const cpfError = document.getElementById('cpfError');

        // Validar CPF
        if (!validaCPF(cpf.value)) {
          e.preventDefault();
          cpfError.style.display = 'block';
          cpf.style.borderColor = '#ff6b6b';
          return false;
        } else {
          cpfError.style.display = 'none';
          cpf.style.borderColor = '#2a2f36';
        }

        return true;
      });

      // Formatação de CPF
      (function () {
        const cpfInput = document.getElementById("cpf");
        const cpfError = document.getElementById("cpfError");

        function formatCPF(value) {
          const digits = value.replace(/\D/g, "").slice(0, 11);
          const parts = [];
          if (digits.length > 0) parts.push(digits.slice(0, 3));
          if (digits.length > 3) parts.push(digits.slice(3, 6));
          if (digits.length > 6) parts.push(digits.slice(6, 9));
          let formatted = parts.join(".");
          if (digits.length > 9) {
            formatted += (formatted ? "-" : "") + digits.slice(9, 11);
          }
          return formatted;
        }

        cpfInput.addEventListener("input", (e) => {
          const formatted = formatCPF(e.target.value);
          e.target.value = formatted;

          // Validação em tempo real quando o CPF tem 11 dígitos
          if (formatted.replace(/\D/g, "").length === 11) {
            if (!validaCPF(formatted)) {
              cpfError.style.display = 'block';
              cpfInput.style.borderColor = '#ff6b6b';
            } else {
              cpfError.style.display = 'none';
              cpfInput.style.borderColor = '#2a2f36';
            }
          } else {
            cpfError.style.display = 'none';
            cpfInput.style.borderColor = '#2a2f36';
          }
        });

        cpfInput.addEventListener("keydown", (e) => {
          const allowed = [
            "Backspace",
            "ArrowLeft",
            "ArrowRight",
            "Delete",
            "Tab",
            "Home",
            "End",
          ];
          if (allowed.includes(e.key)) return;
          if (e.ctrlKey || e.metaKey) return;
          if (!/^\d$/.test(e.key)) e.preventDefault();
        });

        cpfInput.addEventListener("paste", (e) => {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData(
            "text"
          );
          const digits = text.replace(/\D/g, "").slice(0, 11);
          cpfInput.value = formatCPF(digits);
        });
      })();
    </script>
  </body>
</html>
