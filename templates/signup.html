<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/css/style-signup.css">
    <title>Guitar Academy</title>
  </head>
  <body>
    <div class="login-card">
      <i class="fa-solid fa-graduation-cap"></i>
      <div class="signup-main">
      <form action="/cadastro" id="wizardForm" method="post">
        <div class="wizard-container">
          <div class="wizard-page" id="page1">
            <div class="form-group">
              <input type="email" name="email" id="email" placeholder=" " required/>
              <label for="email">E-mail</label>
            </div>
            <div class="form-group">
              <input
                type="tel"
                name="telefone"
                id="telefone"
                placeholder=" "
                maxlength="16"
                required
              />
              <label for="telefone">Telefone</label>
            </div>
            <div class="form-group">
              <input
                id="cpf"
                name="cpf"
                placeholder=" "
                inputmode="numeric"
                maxlength="14"
                autocomplete="off"
                required
              />
              <label for="cpf">CPF</label>
            </div>
            <div id="cpfError" style="color: #ff6b6b; font-size: 0.8rem; text-align: left; display: none; margin-top: -10px; margin-bottom: 5px;">
              CPF inválido!
            </div>
            <div class="button-group single">
              <button type="button" id="nextBtn">PRÓXIMO</button>
            </div>
          </div>
          <div class="wizard-page hidden" id="page2">
            <div class="form-group">
              <input type="password" name="password" id="password" placeholder=" " required minlength="6"/>
              <label for="password">Senha</label>
            </div>
            <div class="form-group">
              <input type="password" name="confirm_password" id="confirm_password" placeholder=" " required>
              <label for="confirm_password">Confirmar Senha</label>
            </div>
            <div id="passwordError" style="color: #ff6b6b; font-size: 0.8rem; text-align: left; display: none; margin-top: -10px; margin-bottom: 5px;">
              As senhas não coincidem!
            </div>
            <div class="button-group">
              <button type="button" id="backBtn">VOLTAR</button>
              <button type="submit">CRIAR CONTA</button>
            </div>
        </div>

        <p class="signup-link">Já tem uma conta? <a href="/login">Entrar</a></p>
      </form>
    </div>
    </div>

    <!-- Modal de Sucesso -->
    <div id="successModal" class="success-modal hidden">
      <div class="success-modal-content">
        <i class="fa-solid fa-check-circle"></i>
        <h2>Cadastro feito com sucesso</h2>
        <p>Sua conta foi criada! Agora realize login para acessar os cursos.</p>
        <a href="/login" class="success-button">Realizar Login</a>
      </div>
    </div>

    <script src="/static/js/signup.js"></script>

  </body>
</html>
